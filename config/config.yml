# =============================================================================
# Soothe Configuration
# =============================================================================
# Use: soothe run --config config/config.yml
# All values are defaults unless noted. Remove sections you don't need.

# =============================================================================
# Model Providers
# =============================================================================
# Define LLM providers. api_key and api_base_url support ${ENV_VAR} syntax.
# Set at least one provider with its API key.

providers:
  - name: openai
    provider_type: openai
    api_key: "${OPENAI_API_KEY}"
    # api_base_url: https://api.openai.com/v1
    models:
      - gpt-4o
      - gpt-4o-mini
      - o3-mini

  # OpenAI-compatible (DashScope, OpenRouter, vLLM):
  # - name: dashscope
  #   provider_type: openai
  #   api_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  #   api_key: "${DASHSCOPE_API_KEY}"
  #   models: [qwen-max]

  # Ollama (local models):
  # - name: ollama
  #   provider_type: ollama
  #   api_base_url: http://localhost:11434
  #   models: [llama3.2, qwen3:8b, deepseek-r1:14b, nomic-embed-text:latest]

  # Anthropic:
  # - name: anthropic
  #   provider_type: anthropic
  #   api_key: "${ANTHROPIC_API_KEY}"
  #   models: [claude-sonnet-4-20250514]

# =============================================================================
# Model Router
# =============================================================================
# Maps roles to "provider:model". Unset roles fall back to "default".

router:
  default: "openai:gpt-4o-mini"
  # think: "openai:o3-mini"
  # fast: "openai:gpt-4o-mini"
  # image: "openai:gpt-4o"
  # embedding: "openai:text-embedding-3-small"
  # web_search: "openai:gpt-4o-mini"

# =============================================================================
# Agent Behavior
# =============================================================================

embedding_dims: 1536
# assistant_name: Soothe
# system_prompt: "Custom system prompt override."
workspace_dir: "."
debug: false
log_level: INFO
# log_file: ~/.soothe/logs/soothe.log
activity_max_lines: 300
# Progress verbosity: minimal | normal | detailed | debug
progress_verbosity: normal

# =============================================================================
# Subagents
# =============================================================================
# All subagents are enabled by default. Set enabled: false to disable.

subagents:
  research:
    enabled: true
    # model: "openai:gpt-4o-mini"
  planner:
    enabled: true
  scout:
    enabled: true
  browser:
    enabled: true
    # config:
    #   disable_extensions: true
    #   disable_cloud: true
    #   disable_telemetry: true
  claude:
    enabled: true
    # model: "anthropic:claude-sonnet-4-20250514"

  skillify:
    enabled: true
    # config:
    #   warehouse_paths: []
    #   index_interval_seconds: 300
    #   index_collection: soothe_skillify
    #   retrieval_top_k: 10

  weaver:
    enabled: true
    # config:
    #   generated_agents_dir: ~/.soothe/generated_agents
    #   reuse_threshold: 0.85
    #   reuse_collection: soothe_weaver_reuse
    #   max_generation_attempts: 2
    #   allowed_tool_groups: []
    #   allowed_mcp_servers: []

  # Remote subagent:
  # remote_analyst:
  #   enabled: true
  #   transport: a2a
  #   url: "http://analyst-agent:8000"

# =============================================================================
# Tools
# =============================================================================
# Enable tool groups. Some require API keys (see config/env.example).

tools:
  - datetime       # Current date/time (no API key)
  - arxiv          # Academic paper search (no API key)
  - wikipedia      # Encyclopedia lookup (no API key)
  - wizsearch      # Multi-engine web search (engines: tavily, duckduckgo, wechat)
  # Optional (require API keys or dependencies):
  # - serper        # Google search via Serper (SERPER_API_KEY)
  # - jina          # Web page reader via Jina (JINA_API_KEY)
  # - image         # Image analysis (OpenAI)
  # - audio         # Audio transcription (OpenAI)
  # - video         # Video info extraction
  # - tabular       # Tabular data tools
  # LangChain community:
  # - arxiv         # ArxivQueryRun (no API key)
  # - wikipedia     # WikipediaQueryRun (no API key)
  # - github        # GitHub API (GITHUB_TOKEN)
  # - python_repl   # Python REPL (security risk)

# =============================================================================
# MCP Servers
# =============================================================================

mcp_servers: []
  # - command: npx
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
  #   transport: stdio
  # - url: http://localhost:3000/mcp
  #   transport: sse

# =============================================================================
# Skills & Memory
# =============================================================================

skills: []
memory: []

# =============================================================================
# Protocols
# =============================================================================

context_backend: keyword
# context_persist_dir: ~/.soothe/context
# context_persist_backend: json

memory_backend: keyword
# memory_persist_path: ~/.soothe/memory
# memory_persist_backend: json

# Planner routing: auto | always_direct | always_planner | always_claude
planner_routing: auto
policy_profile: standard

durability_backend: in_memory
checkpointer_backend: memory
# checkpointer_sqlite_path: ~/.soothe/checkpoints.sqlite
# checkpointer_postgres_dsn: postgresql://user:pass@localhost:5432/soothe
# durability_metadata_path: ~/.soothe/durability/threads.json

concurrency:
  max_parallel_subagents: 1
  max_parallel_tools: 3
  max_parallel_steps: 1
  step_parallelism: dependency

# =============================================================================
# Vector Store
# =============================================================================

vector_store_provider: none
vector_store_collection: soothe_default
# vector_store_config:
#   dsn: "postgresql://postgres:postgres@localhost:5432/vectordb"
#   url: "http://localhost:8080"
